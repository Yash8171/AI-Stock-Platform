services:
  - type: web
    name: algosignal-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
  - type: worker
    name: algosignal-alerts
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python alert_job.py
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: RUN_CONTINUOUS
        value: "true"
      - key: ALERT_INTERVAL_SECONDS
        value: "300"
      - key: PYTHON_VERSION
        value: 3.10.0
