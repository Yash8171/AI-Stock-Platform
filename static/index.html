<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoSignal AI | Advanced Predictive Intelligence</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="AlgoSignal Logo">
                <span>AlgoSignal AI <small style="font-size: 0.6rem; color: var(--accent-color); vertical-align: super;">v3.0 (NEW)</small></span>
            </div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active">
                        <i>📊</i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="alerts.html" class="nav-link">
                        <i>🔔</i> Alerts
                    </a>
                </li>
                <li class="nav-item">
                    <a href="tabular.html" class="nav-link">
                        <i>🧠</i> Analytics
                    </a>
                </li>
                <li class="nav-item">
                    <a href="report.html" class="nav-link">
                        <i>📋</i> Reports
                    </a>
                </li>
            </ul>

            <div id="userProfile" class="user-sidebar-bottom">
                <div class="user-info">
                    <div class="avatar" id="userInitial">?</div>
                    <div>
                        <div id="userName" style="font-weight: 700; font-size: 0.9rem;">Guest User</div>
                        <div style="font-size: 0.7rem; color: var(--text-secondary);">Free Tier</div>
                    </div>
                </div>
                <button onclick="handleAuthAction()" id="authBtn" class="nav-link" style="width: 100%; border: none; background: none; cursor: pointer;">
                    <i>🔑</i> Login
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Market Overview</h1>
                    <p style="color: var(--text-secondary);">Real-time AI prediction signals for top 10 assets</p>
                </div>
                <div class="live-badge" id="refreshTimes">
                    <span class="pulse-dot"></span>
                    LIVE ENGINE ACTIVE
                </div>
            </header>

            <div class="stock-grid" id="stocksGrid">
                <!-- Stock cards will be injected here by JS -->
                <div class="loading">Analyzing market data...</div>
            </div>
        </main>
    </div>

    <script src="js/app.js?v=3"></script>
</body>
</html>
